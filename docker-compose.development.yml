services:
  frontend:
    container_name: "ilias-docker-training-dev"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: "development"
    restart: unless-stopped
    ports:
      - "3000:80"

  backend:
    container_name: "ilias-docker-training-backend-dev"
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - planets-data-dev:/app/data

volumes:
  planets-data-dev:
