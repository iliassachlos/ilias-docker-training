services:
  frontend:
    container_name: "ilias-docker-training"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: "production"
    restart: unless-stopped
    ports:
      - "3002:80"

  backend:
    container_name: "ilias-docker-training-backend"
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - planets-data:/app/data

volumes:
  planets-data:
